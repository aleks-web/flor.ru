services:
  kc_pg:
      container_name: kc_pg
      image: postgres:18.3
      restart: always
      volumes:
        - /data/kc/postgres:/var/lib/postgresql
      environment:
        POSTGRES_DB: keycloak
        POSTGRES_USER: ${POSTGRES_USER:-keycloak}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eX4mP13p455w0Rd}

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: dok.go@yandex.ru
      PGADMIN_DEFAULT_PASSWORD: root
    expose:
      - 80
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
    depends_on:  
      - kc_pg

  keycloak:
      image: quay.io/keycloak/keycloak:26.5
      container_name: keycloak
      restart: on-failure:5
      environment:
        KEYCLOAK_ADMIN: admin
        KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-eX4mP13p455w0Rd}
        KC_LOG_LEVEL: debug
        PROXY_ADDRESS_FORWARDING: true
        KC_PROXY: edge
        KC_DB: postgres
        KC_DB_URL: 'jdbc:postgresql://kc_pg/keycloak'
        KC_DB_USERNAME: ${POSTGRES_USER:-keycloak}
        KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-eX4mP13p455w0Rd}
        KC_DB_SCHEMA: public
        KC_HOSTNAME: ${KC_HOSTNAME:-kc.flor.ru}
        KC_HTTP_ENABLED: true
        HTTP_ADDRESS_FORWARDING: true
        KC_PROXY_HEADERS: xforwarded
      ports:
        - '8080:8080'
      volumes:
        - ./data/kc/data:/opt/keycloak/data
      depends_on:
        - kc_pg
      entrypoint: "/opt/keycloak/bin/kc.sh start"
  
  nginx:
    container_name: nginx
    build:
        context: ./
        dockerfile: ./services/nginx/Dockerfile
    volumes:
        - ./services/nginx/configs/conf.d:/etc/nginx/conf.d
        - ./services/nginx/configs/nginx.conf:/etc/nginx/nginx.conf
        - ./services/nginx/configs/sites-available:/etc/nginx/sites-available
        - ./services/nginx/ssl:/etc/ssl/flor.ru
    ports:
        - "80:80"
        - "443:443"
    depends_on: ["pgadmin", "keycloak", "testapp"]

  testapp:
    container_name: testapp
    build: ./apps/test
    expose:
      - 3000
    depends_on: ["keycloak"]